name: Codety Scanner

on:
  pull_request:
    branches: [main]

jobs:
  codety:
    name: Codety Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Codety Scanner
        uses: aspect-build/codety-scanner@v1
        with:
          scan_path: '.'
