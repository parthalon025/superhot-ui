# MegaLinter configuration
# https://megalinter.io/latest/configuration/

# Use cupcake flavor (optimized for most projects)
FLAVOR: cupcake

# Apply fixes from linters
APPLY_FIXES: none  # Set to 'all' to auto-fix

# Report options
SHOW_ELAPSED_TIME: true
FILEIO_REPORTER: false
SARIF_REPORTER: true

# Disable linters that overlap with our local plugins
DISABLE_LINTERS:
  # We handle these locally for faster feedback
  # - BASH_SHELLCHECK  # Uncomment if you want MegaLinter to skip shellcheck

# Filter
FILTER_REGEX_EXCLUDE: '(node_modules|\.venv|dist|build|coverage)/'

# Error level (comment = warning, error = blocking)
LINTER_RULES_PATH: '.'
